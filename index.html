<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tabiji | 旅した場所を、あなたの地図に。</title>
  <meta name="description" content="tabijiは、旅した日本国内の都道府県と海外の国を記録できるモバイルアプリです。" />
  <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/logo-mark-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/logo-mark-180.png" />
  <meta property="og:title" content="tabiji | 旅した場所を、あなたの地図に。" />
  <meta property="og:description" content="旅した都道府県と海外の国を、地図で記録するモバイルアプリ。" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="tabiji" />
  <meta property="og:locale" content="ja_JP" />
  <meta property="og:image" content="assets/logo-1200x630.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="tabiji - 旅した場所を、あなたの地図に。" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="tabiji | 旅した場所を、あなたの地図に。" />
  <meta name="twitter:description" content="旅した都道府県と海外の国を、地図で記録するモバイルアプリ。" />
  <meta name="twitter:image" content="assets/logo-1200x630.png" />
  <meta name="theme-color" content="#b9b9b9" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" />
  <style>
    :root {
      --canvas: #b9b9b9;
      --panel: #ffffff;
      --ink: #0b0b0b;
      --muted: #737373;
      --soft: #eeeeee;
      --line: #e6e6e6;
      --line-dark: #d6d6d6;
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Noto Sans JP", Inter, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      color: var(--ink);
      background: var(--canvas);
      letter-spacing: -0.035em;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .stage {
      min-height: 100vh;
      display: block;
      padding: 0;
    }

    .shell {
      width: 100%;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--panel);
      box-shadow: none;
      overflow: hidden;
    }

    .content {
      position: relative;
      min-height: 100vh;
      padding: 46px clamp(34px, 5vw, 78px) 34px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: #fff;
    }

    .brand {
      display: grid;
      justify-items: center;
      gap: 11px;
    }

    .brand-mark {
      position: relative;
      width: 26px;
      height: 32px;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      background: var(--ink);
      transform: skew(-14deg);
    }

    .brand-mark::before {
      width: 12px;
      height: 19px;
      left: 3px;
      top: 1px;
    }

    .brand-mark::after {
      width: 10px;
      height: 15px;
      right: 3px;
      bottom: 1px;
    }

    .brand-name {
      font-size: 17px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: -0.06em;
    }

    .main {
      align-self: center;
      width: min(100%, 380px);
      justify-self: center;
      text-align: center;
      padding-top: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 4vw, 46px);
      line-height: 1.18;
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 12px auto 0;
      max-width: 310px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.72;
      letter-spacing: -0.02em;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    .download-label {
      margin: 0 0 6px;
    }

    .store-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .store-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease;
    }

    .store-badge:not([aria-disabled="true"]):hover {
      transform: translateY(-2px);
    }

    .store-badge[aria-disabled="true"] {
      pointer-events: none;
      cursor: default;
      opacity: 0.55;
    }

    .store-badge img {
      height: 44px;
      width: auto;
      display: block;
    }

    .separator {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 14px;
      margin: 18px 0;
      color: #9b9b9b;
      font-size: 11px;
      letter-spacing: -0.01em;
    }

    .separator::before,
    .separator::after {
      content: "";
      height: 1px;
      background: var(--line);
    }

    .link-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .link-card {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      color: #222;
      background: #fff;
      font-size: 11px;
      font-weight: 720;
      letter-spacing: -0.02em;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .link-card:hover {
      transform: translateY(-2px);
      border-color: var(--ink);
      background: #fafafa;
    }

    .note {
      margin: 18px auto 0;
      max-width: 300px;
      color: #989898;
      font-size: 10.5px;
      line-height: 1.6;
      letter-spacing: -0.01em;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      color: #8b8b8b;
      font-size: 12.5px;
      letter-spacing: -0.01em;
    }

    .footer-links a {
      transition: color 0.18s ease;
    }

    .footer-links a:hover {
      color: var(--ink);
    }

    .visual {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(0,0,0,0.35) 100%),
        url("https://images.unsplash.com/photo-1682685796467-89a6f149f07a?q=80&w=3270&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .copyright {
      position: absolute;
      right: 20px;
      bottom: 16px;
      color: rgba(255,255,255,0.78);
      font-size: 10px;
      letter-spacing: 0.02em;
      z-index: 2;
      text-shadow: 0 1px 4px rgba(0,0,0,0.45);
    }

    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
        grid-template-rows: 38vh 1fr;
        min-height: 100vh;
      }

      .content {
        min-height: auto;
        padding: 34px 24px 28px;
      }

      .visual {
        min-height: 38vh;
        order: -1;
      }

      .main {
        width: 100%;
      }

      .store-row,
      .link-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="shell" aria-label="tabiji landing page">
      <div class="content">
        <header class="brand" aria-label="tabiji">
          <div class="brand-mark" aria-hidden="true"></div>
          <div class="brand-name">tabiji</div>
        </header>

        <div class="main">
          <h1>旅した場所を、<br />あなたの地図に。</h1>
          <p class="lead">
            tabijiは、旅した日本国内の都道府県と海外の国を記録できるモバイルアプリです。
          </p>

          <div class="actions" id="download">
            <div class="separator download-label">アプリダウンロードページへ</div>

            <div class="store-row">
              <a class="store-badge" href="#" aria-disabled="true" tabindex="-1" aria-label="App Store版は準備中です">
                <img src="assets/app-store-badge.svg" alt="Download on the App Store" width="132" height="44" />
              </a>
              <a class="store-badge" href="#" aria-disabled="true" tabindex="-1" aria-label="Google Play版は準備中です">
                <img src="assets/google-play-badge.svg" alt="Google Play で手に入れよう" width="113" height="44" />
              </a>
            </div>
          </div>
        </div>

        <footer class="footer-links">
          <a href="mailto:contact.tabiji@gmail.com">お問い合わせ</a>
          <a href="terms.html">利用規約</a>
          <a href="privacy.html">プライバシーポリシー</a>
        </footer>
      </div>

      <aside class="visual" aria-label="旅のイメージビジュアル">
        <div class="copyright">TABIJi / Travel Record App</div>
      </aside>
    </section>
  </main>
</body>
</html>
