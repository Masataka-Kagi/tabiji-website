<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tabiji | 旅した場所を、あなたの地図に。</title>
  <meta name="description" content="tabijiは、旅した日本国内の都道府県と海外の国を記録できるモバイルアプリです。" />
  <meta property="og:title" content="tabiji | 旅した場所を、あなたの地図に。" />
  <meta property="og:description" content="旅した都道府県と海外の国を、地図で記録するモバイルアプリ。" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#b9b9b9" />
  <style>
    :root {
      --canvas: #b9b9b9;
      --panel: #ffffff;
      --ink: #0b0b0b;
      --muted: #737373;
      --soft: #eeeeee;
      --line: #e6e6e6;
      --line-dark: #d6d6d6;
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      color: var(--ink);
      background: var(--canvas);
      letter-spacing: -0.035em;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(24px, 6vw, 78px);
    }

    .shell {
      width: min(100%, 1040px);
      min-height: 640px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--panel);
      box-shadow: 0 34px 90px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    .content {
      position: relative;
      min-height: 640px;
      padding: 46px clamp(34px, 5vw, 78px) 34px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: #fff;
    }

    .brand {
      display: grid;
      justify-items: center;
      gap: 9px;
    }

    .brand-mark {
      position: relative;
      width: 18px;
      height: 22px;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      background: var(--ink);
      transform: skew(-14deg);
    }

    .brand-mark::before {
      width: 8px;
      height: 13px;
      left: 2px;
      top: 1px;
    }

    .brand-mark::after {
      width: 7px;
      height: 10px;
      right: 2px;
      bottom: 1px;
    }

    .brand-name {
      font-size: 13px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: -0.06em;
    }

    .main {
      align-self: center;
      width: min(100%, 340px);
      justify-self: center;
      text-align: center;
      padding-top: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 4vw, 46px);
      line-height: 1.02;
      font-weight: 850;
      letter-spacing: -0.085em;
    }

    .lead {
      margin: 12px auto 0;
      max-width: 310px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.72;
      letter-spacing: -0.02em;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    .download-label {
      margin: 0 0 6px;
    }

    .store-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      height: 42px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line-dark);
      background: #fff;
      font-size: 12px;
      font-weight: 760;
      letter-spacing: -0.025em;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      border-color: var(--ink);
    }

    .btn.primary {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .btn.primary:hover {
      background: #222;
    }

    .btn.full {
      width: 100%;
    }

    .icon {
      width: 15px;
      height: 15px;
      display: inline-grid;
      place-items: center;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0;
    }

    .separator {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 14px;
      margin: 18px 0;
      color: #9b9b9b;
      font-size: 11px;
      letter-spacing: -0.01em;
    }

    .separator::before,
    .separator::after {
      content: "";
      height: 1px;
      background: var(--line);
    }

    .link-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .link-card {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      color: #222;
      background: #fff;
      font-size: 11px;
      font-weight: 720;
      letter-spacing: -0.02em;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .link-card:hover {
      transform: translateY(-2px);
      border-color: var(--ink);
      background: #fafafa;
    }

    .note {
      margin: 18px auto 0;
      max-width: 300px;
      color: #989898;
      font-size: 10.5px;
      line-height: 1.6;
      letter-spacing: -0.01em;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 22px;
      color: #8b8b8b;
      font-size: 10.5px;
      letter-spacing: -0.01em;
    }

    .footer-links a {
      transition: color 0.18s ease;
    }

    .footer-links a:hover {
      color: var(--ink);
    }

    .visual {
      position: relative;
      min-height: 640px;
      overflow: hidden;
      background: #d0d0d0;
      isolation: isolate;
    }

    .visual::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 78% 8%, #f8f8f8 0 4%, transparent 4.2% 100%),
        radial-gradient(circle at 88% 14%, #f1f1f1 0 6%, transparent 6.2% 100%),
        radial-gradient(circle at 72% 18%, #ededed 0 5%, transparent 5.2% 100%),
        linear-gradient(135deg, transparent 0 46%, rgba(255,255,255,0.35) 46.2% 51%, transparent 51.2%),
        linear-gradient(115deg, transparent 0 34%, #8d8d8d 34.2% 35%, transparent 35.2%),
        linear-gradient(115deg, transparent 0 48%, #7d7d7d 48.2% 49%, transparent 49.2%),
        linear-gradient(160deg, transparent 0 44%, #9d9d9d 44.2% 63%, transparent 63.2%),
        linear-gradient(22deg, transparent 0 43%, #777 43.2% 63%, transparent 63.2%),
        linear-gradient(180deg, #c9c9c9 0 28%, #ababab 28% 52%, #dedede 52% 58%, #9a9a9a 58% 100%);
      filter: grayscale(1) contrast(1.08);
      z-index: -2;
    }

    .visual::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(#111 0.7px, transparent 0.8px);
      background-size: 4px 4px;
      mix-blend-mode: multiply;
      opacity: 0.62;
      z-index: -1;
    }

    .sun {
      position: absolute;
      left: 16%;
      top: 16%;
      width: 70px;
      height: 180px;
      border-left: 2px solid rgba(0,0,0,0.35);
    }

    .bridge {
      position: absolute;
      left: -8%;
      top: 32%;
      width: 56%;
      height: 42%;
      border: 4px solid rgba(0,0,0,0.48);
      border-right: 0;
      border-radius: 100% 0 0 0;
      transform: skewX(-8deg);
      opacity: 0.85;
    }

    .bridge::before,
    .bridge::after {
      content: "";
      position: absolute;
      top: -6px;
      width: 2px;
      height: 165px;
      background: rgba(0,0,0,0.38);
    }

    .bridge::before { left: 34%; }
    .bridge::after { left: 68%; }

    .mountain {
      position: absolute;
      right: -10%;
      bottom: 15%;
      width: 80%;
      height: 46%;
      background:
        linear-gradient(140deg, transparent 0 48%, #4f4f4f 48.2% 70%, transparent 70.2%),
        linear-gradient(24deg, transparent 0 28%, #686868 28.2% 60%, transparent 60.2%);
      clip-path: polygon(0 70%, 18% 38%, 34% 52%, 52% 18%, 74% 44%, 100% 20%, 100% 100%, 0 100%);
      opacity: 0.95;
    }

    .water {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 28%;
      background:
        repeating-linear-gradient(172deg, rgba(255,255,255,0.42) 0 2px, transparent 2px 14px),
        linear-gradient(180deg, rgba(255,255,255,0.2), rgba(0,0,0,0.18));
      opacity: 0.8;
    }

    .boat {
      position: absolute;
      left: 14%;
      bottom: 20%;
      width: 44%;
      height: 13%;
      border-radius: 4px 4px 42px 42px;
      background: #efefef;
      clip-path: polygon(0 35%, 82% 35%, 100% 0, 88% 78%, 20% 100%, 0 58%);
      filter: contrast(1.15);
    }

    .boat::before {
      content: "";
      position: absolute;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: #777;
      right: 18%;
      top: -18px;
    }

    .copyright {
      position: absolute;
      right: 20px;
      bottom: 16px;
      color: rgba(255,255,255,0.55);
      font-size: 10px;
      letter-spacing: 0.02em;
      z-index: 2;
    }

    @media (max-width: 900px) {
      .stage {
        padding: 28px;
      }

      .shell {
        grid-template-columns: 1fr;
        width: min(100%, 560px);
        min-height: auto;
      }

      .content {
        min-height: 620px;
      }

      .visual {
        min-height: 360px;
        order: -1;
      }
    }

    @media (max-width: 560px) {
      .stage {
        padding: 0;
        place-items: stretch;
      }

      .shell {
        width: 100%;
        min-height: 100vh;
        box-shadow: none;
      }

      .content {
        min-height: 620px;
        padding: 34px 24px 28px;
      }

      .visual {
        min-height: 260px;
      }

      .main {
        width: 100%;
      }

      .store-row,
      .link-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="shell" aria-label="tabiji landing page">
      <div class="content">
        <header class="brand" aria-label="tabiji">
          <div class="brand-mark" aria-hidden="true"></div>
          <div class="brand-name">tabiji</div>
        </header>

        <div class="main">
          <h1>旅した場所を、<br />あなたの地図に。</h1>
          <p class="lead">
            tabijiは、旅した日本国内の都道府県と海外の国を記録できるモバイルアプリです。
          </p>

          <div class="actions" id="download">
            <div class="separator download-label">アプリダウンロードページへ</div>

            <div class="store-row">
              <a class="btn" href="#" aria-label="App Storeでtabijiを見る">
                <span class="icon"></span>
                <span>App Store</span>
              </a>
              <a class="btn" href="#" aria-label="Google Playでtabijiを見る">
                <span class="icon">G</span>
                <span>Google Play</span>
              </a>
            </div>
          </div>
        </div>

        <footer class="footer-links">
          <a href="mailto:contact.tabiji@gmail.com">お問い合わせ</a>
          <a href="terms.html">利用規約</a>
          <a href="privacy.html">プライバシーポリシー</a>
        </footer>
      </div>

      <aside class="visual" aria-label="旅のイメージビジュアル">
        <div class="sun" aria-hidden="true"></div>
        <div class="bridge" aria-hidden="true"></div>
        <div class="mountain" aria-hidden="true"></div>
        <div class="water" aria-hidden="true"></div>
        <div class="boat" aria-hidden="true"></div>
        <div class="copyright">TABIJi / Travel Record App</div>
      </aside>
    </section>
  </main>
</body>
</html>
